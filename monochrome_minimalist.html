<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monochrome Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Desaturated architecture background */
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2560&auto=format&fit=crop&grayscale=true');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Inter', sans-serif; color: #fff; margin: 0; min-height: 100vh;
        }
        /* Very strict, clean frosted glass */
        .glass-strict {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px; /* Minimal rounding */
        }
    </style>
</head>
<body class="p-8 flex flex-col">
    <header class="glass-strict p-6 mb-8 flex justify-between items-end border-b-2 border-white">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter uppercase">Corp.Data</h1>
            <p class="text-gray-400 text-sm mt-1">Q3 Financial Overview</p>
        </div>
        <div class="text-right">
            <p class="text-sm text-gray-400">Total Revenue</p>
            <p class="text-2xl font-light">$4.2M</p>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 flex-1">
        <div class="glass-strict p-6 md:col-span-1 flex flex-col gap-4">
            <h3 class="text-gray-400 text-xs uppercase tracking-widest border-b border-gray-700 pb-2">Navigation</h3>
            <a href="#" class="text-white hover:text-gray-300 flex justify-between"><span>Overview</span> <span>→</span></a>
            <a href="#" class="text-gray-500 hover:text-white flex justify-between"><span>Analytics</span> <span>→</span></a>
            <a href="#" class="text-gray-500 hover:text-white flex justify-between"><span>Settings</span> <span>→</span></a>
        </div>
        
        <div class="md:col-span-3 grid grid-cols-2 gap-6">
            <div class="glass-strict p-6">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-4">Active Users</p>
                <p class="text-5xl font-light">12,409</p>
                <div class="mt-6 flex gap-2">
                    <span class="px-2 py-1 bg-white text-black text-xs font-bold">+5.4%</span>
                    <span class="px-2 py-1 border border-white/20 text-xs text-gray-400">vs last week</span>
                </div>
            </div>
            <div class="glass-strict p-6">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-4">Bounce Rate</p>
                <p class="text-5xl font-light">24.8%</p>
                <div class="mt-6 flex gap-2">
                    <span class="px-2 py-1 border border-white/20 text-xs text-gray-400">Stable</span>
                </div>
            </div>
            <div class="glass-strict p-6 col-span-2">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-4">System Status</p>
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-sm">Main Database</span> <span class="w-2 h-2 bg-white rounded-full"></span>
                    </div>
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-sm">Authentication API</span> <span class="w-2 h-2 bg-white rounded-full"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magma Esports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            /* Volcanic / Aggressive red background */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2560&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; margin: 0; min-height: 100vh;
        }
        /* Sharp, angled glass panels */
        .glass-hud {
            background: linear-gradient(145deg, rgba(30, 0, 0, 0.7), rgba(100, 0, 0, 0.3));
            backdrop-filter: blur(8px);
            border-top: 2px solid #ef4444; /* Red top border accent */
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transform: skew(-2deg); /* Aggressive slight slant */
        }
        .unskew { transform: skew(2deg); } /* Revert slant for text */
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-between">
    <header class="flex justify-between items-start">
        <div class="glass-hud p-4 px-8 inline-block">
            <div class="unskew flex items-center gap-4">
                <i class="ph-fill ph-sword text-red-500 text-3xl"></i>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-widest text-red-100">Team <span class="text-red-500">Inferno</span></h1>
                    <p class="text-red-500/70 text-xs uppercase font-bold tracking-widest">Tournament HUD</p>
                </div>
            </div>
        </div>
        <div class="glass-hud p-3 px-6 hidden md:block">
            <div class="unskew flex gap-8 text-sm font-bold uppercase">
                <span class="text-red-500">Live Match</span>
                <span>vs. Zenith</span>
                <span class="text-yellow-500">02:14:09</span>
            </div>
        </div>
    </header>

    <div class="mt-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="glass-hud p-6">
            <div class="unskew">
                <h3 class="text-red-400 font-bold uppercase tracking-wider mb-4 border-b border-red-500/30 pb-2">Player 1: VORTEX</h3>
                <div class="flex justify-between items-end mb-2">
                    <span class="text-gray-400 text-sm">Damage Output</span>
                    <span class="text-2xl font-black">14,209</span>
                </div>
                <div class="w-full bg-black h-2 mb-4"><div class="bg-red-500 w-[80%] h-full shadow-[0_0_10px_red]"></div></div>
                
                <div class="flex justify-between items-end mb-2">
                    <span class="text-gray-400 text-sm">Accuracy</span>
                    <span class="text-xl font-bold">68%</span>
                </div>
                <div class="w-full bg-black h-2"><div class="bg-orange-500 w-[68%] h-full"></div></div>
            </div>
        </div>

        <div class="glass-hud p-6 flex flex-col justify-center items-center text-center border-t-4 border-red-500">
            <div class="unskew">
                <h2 class="text-red-500 font-black text-xl tracking-widest uppercase mb-2">Current Score</h2>
                <div class="text-7xl font-black flex items-center gap-4">
                    <span class="text-white">12</span> <span class="text-red-700">-</span> <span class="text-red-500/50">8</span>
                </div>
                <button class="mt-6 bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-8 uppercase tracking-widest transition shadow-[0_0_15px_rgba(220,38,38,0.6)]">
                    Tactical Pause
                </button>
            </div>
        </div>
    </div>
</body>
</html>
